<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Prakrut Kotecha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0f;
            --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            --card-bg: rgba(30, 30, 45, 0.8);
            --card-glass: rgba(255, 255, 255, 0.05);
            --text-main: #f8f9fa;
            --text-secondary: #b8bcc8;
            --accent: #00d4ff;
            --accent-gradient: linear-gradient(135deg, #00d4ff, #0066ff);
            --accent-secondary: #ff6b9d;
            --border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(10, 10, 15, 0.9);
            --icon-color: #f8f9fa;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --glow: 0 0 20px rgba(0, 212, 255, 0.3);
            --map-ocean: #0f2744;
            --map-land: #1e3a5f;
            --map-border: rgba(0, 212, 255, 0.25);
            --map-grid: rgba(0, 212, 255, 0.06);
            --map-country-border: rgba(0, 212, 255, 0.15);
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --bg-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 50%, #dee2e6 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-glass: rgba(0, 0, 0, 0.03);
            --text-main: #212529;
            --text-secondary: #6c757d;
            --accent: #0066ff;
            --accent-gradient: linear-gradient(135deg, #0066ff, #00d4ff);
            --accent-secondary: #ff6b9d;
            --border: rgba(0, 0, 0, 0.1);
            --nav-bg: rgba(248, 249, 250, 0.9);
            --icon-color: #212529;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --glow: 0 0 20px rgba(0, 102, 255, 0.2);
            --map-ocean: #c8dff0;
            --map-land: #8fbc8f;
            --map-border: rgba(0, 100, 0, 0.2);
            --map-grid: rgba(0, 0, 0, 0.06);
            --map-country-border: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            font-weight: 400;
            transition: all 0.3s ease;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-secondary); }

        html { scroll-behavior: smooth; }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
        }

        nav {
            position: sticky;
            top: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 15px 0;
            box-shadow: var(--shadow);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .nav-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-main);
            text-decoration: none;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a {
            margin-left: 12px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .nav-links a:hover { 
            color: var(--text-main);
            transform: translateY(-2px);
        }
        
        .nav-links .active { 
            color: var(--text-main);
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            background: var(--card-glass);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            margin-left: 20px;
            padding: 8px;
            color: var(--icon-color);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover { 
            transform: scale(1.1) rotate(180deg);
            box-shadow: var(--glow);
        }

        .container {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 40px;
        }

        h1 { 
            margin-bottom: 40px; 
            color: var(--text-main); 
            font-weight: 800;
            font-size: 3rem;
            text-align: center;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--card-glass);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
        }

        .back-btn:hover {
            color: var(--accent);
            transform: translateX(-5px);
        }

        .hidden { display: none !important; }

        /* World Map */
        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease-out;
        }

        .world-map {
            width: 100%;
            height: auto;
            display: block;
        }

        .map-pin {
            position: absolute;
            cursor: pointer;
            transform: translate(-50%, -100%);
            z-index: 10;
        }

        .pin-head {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #ff6b9d, #ff8a80);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.5);
            transition: all 0.3s ease;
        }

        .map-pin:hover .pin-head {
            transform: rotate(-45deg) scale(1.2);
            box-shadow: 0 6px 25px rgba(255, 107, 157, 0.8);
        }

        .pin-pulse {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: rgba(255, 107, 157, 0.5);
            border-radius: 50%;
            animation: pinPulse 2s infinite;
        }

        @keyframes pinPulse {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) scale(3); opacity: 0; }
        }

        .pin-label {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 45, 0.95);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            white-space: nowrap;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }

        .map-pin:hover .pin-label {
            opacity: 1;
            bottom: 40px;
        }

        .pin-label::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid var(--border);
        }

        .pin-label-count {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 2px;
        }

        /* World Map SVG styles */
        .world-map .ocean-bg { fill: var(--map-ocean); transition: fill 0.3s ease; }
        .world-map .country { stroke: var(--map-border); stroke-width: 0.5; transition: all 0.3s ease; cursor: default; }
        .world-map .country.pinned { cursor: pointer; transition: all 0.3s ease; }
        .world-map .country.pinned:hover { filter: brightness(1.5) drop-shadow(0 0 8px rgba(255, 107, 157, 0.6)); transform-origin: center; }
        .world-map .graticule { fill: none; stroke: var(--map-grid); stroke-width: 0.5; transition: stroke 0.3s ease; }
        .world-map .country-border { fill: none; stroke: var(--map-country-border); stroke-width: 0.3; transition: stroke 0.3s ease; }

        /* Folders Grid */
        .folders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        .folder-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .folder-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--shadow), var(--glow);
            border-color: var(--accent);
        }

        .folder-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .folder-info {
            padding: 20px;
        }

        .folder-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 8px 0;
        }

        .folder-count {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Photos Grid */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        .photo-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
        }

        .photo-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow), var(--glow);
            border-color: var(--accent);
        }

        .photo-item img,
        .photo-item video {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .video-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid white;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox.active { display: flex; }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .lightbox-close:hover { transform: scale(1.2); }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            color: white;
            cursor: pointer;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .lightbox-nav:hover { transform: translateY(-50%) scale(1.2); }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        .lightbox-content {
            max-width: 90%;
            max-height: 80vh;
        }

        .lightbox-content img,
        .lightbox-content video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
        }

        @media (max-width: 700px) {
            .nav-container { 
                flex-direction: column; 
                gap: 15px; 
                padding: 15px;
            }
            .nav-links { 
                flex-wrap: wrap; 
                justify-content: center; 
            }
            .nav-links a { margin: 4px 8px; font-size: 0.9rem; }
            h1 { font-size: 2.2rem; }
            .folders-grid, .photos-grid { grid-template-columns: 1fr; }
            .marker-label { font-size: 0.75rem; padding: 6px 12px; }
        }

        footer {
            margin-top: 80px;
            margin-bottom: 40px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }
    </style>
</head>

    <div class="container">

        <!-- World Map View -->
        <div class="map-wrapper" id="map-view">
            <svg class="world-map" id="world-map-svg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
                <rect width="1000" height="500" class="ocean-bg"/>
            </svg>

            <!-- Map Pins - positioned via JS using real lat/lon -->
            <!-- Italy (Rome) -->
            <div class="map-pin" data-lat="41.9" data-lon="12.5" onclick="openAlbum('Italy', 'Gallery/Italy/')">

                <div class="pin-pulse"></div>
                <div class="pin-label">
                    🇮🇹 Italy
                    <span class="pin-label-count">17 items</span>
                </div>
            </div>

            <!-- Seoul, Korea -->
            <div class="map-pin" data-lat="37.6" data-lon="127.0" onclick="openAlbum('Seoul, Korea', 'Gallery/Seoul, Korea/')">
                <div class="pin-head"></div>
                <div class="pin-pulse"></div>
                <div class="pin-label">

            <!-- Jodhpur, India -->

                    <span class="pin-label-count">10 items</span>
                </div>

        </div>

        <!-- Photos View -->
        <div class="hidden" id="photos-view">
            <a class="back-btn" onclick="showMap()">← Back to Map</a>
            <div class="folders-grid" id="folders-grid"></div>
        </div>

        <footer>&copy; 2026 Prakrut Kotecha. Hosted on GitHub Pages.</footer>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">&#10094;</span>
        <span class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">&#10095;</span>
        <div class="lightbox-content" id="lightbox-content"></div>
    </div>

        };

        const albumInfo = {
            'Italy': { icon: '🇮🇹', cover: 'Gallery/Italy/IMG-20240830-WA0022.jpg' },
            'Jodhpur': { icon: '🕌', cover: 'Gallery/Jodhpur/IMG_20250702_125958.jpg' },
            'Seoul, Korea': { icon: '🇰🇷', cover: 'Gallery/Seoul, Korea/20250929_203652.jpg' }
        };

        let currentAlbum = '';
        let currentPath = '';
        let currentIndex = 0;
        let currentItems = [];

        function openAlbum(albumName, path) {
            currentAlbum = albumName;
            currentPath = path;
            currentItems = albums[albumName];
            
            document.getElementById('page-title').textContent = albumInfo[albumName].icon + ' ' + albumName;
            document.getElementById('map-view').classList.add('hidden');
            document.getElementById('photos-view').classList.remove('hidden');
            
            renderPhotos();
        }

        function showMap() {
            document.getElementById('page-title').textContent = 'Gallery';
            document.getElementById('map-view').classList.remove('hidden');
            document.getElementById('photos-view').classList.add('hidden');
        }

        function renderPhotos() {
            const grid = document.getElementById('folders-grid');
            grid.innerHTML = currentItems.map((item, index) => {
                const src = currentPath + item.file;
                if (item.type === 'video') {
                    return `
                        <div class="photo-item" onclick="openLightbox(${index})">
                            <span class="video-badge"><span class="play-icon"></span> Video</span>
                            <video src="${src}" muted autoplay loop playsinline></video>
                        </div>
                    `;
                }
                return `
                    <div class="photo-item" onclick="openLightbox(${index})">
                        <img src="${src}" alt="${item.file}" loading="lazy">
                    </div>
                `;
            }).join('');
        }

        function openLightbox(index) {
            currentIndex = index;
            showLightboxContent();
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.getElementById('lightbox-content').innerHTML = '';
        }

        function navigateLightbox(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = currentItems.length - 1;
            if (currentIndex >= currentItems.length) currentIndex = 0;
            showLightboxContent();
        }

        function showLightboxContent() {
            const item = currentItems[currentIndex];
            const src = currentPath + item.file;
            const contentDiv = document.getElementById('lightbox-content');
            
            if (item.type === 'video') {
                contentDiv.innerHTML = `<video src="${src}" controls autoplay loop muted style="max-width:90%;max-height:80vh;border-radius:8px;"></video>`;
            } else {
                contentDiv.innerHTML = `<img src="${src}" alt="${item.file}">`;
            }
        }

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        // Theme Toggle
        const toggleButton = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            htmlElement.setAttribute('data-theme', 'light');
            toggleButton.innerHTML = '&#9790;';
        }

        toggleButton.addEventListener('click', () => {
            const hasLightTheme = htmlElement.getAttribute('data-theme') === 'light';
            if (hasLightTheme) {
                htmlElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
                toggleButton.innerHTML = '&#9728;';
            } else {
                htmlElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                toggleButton.innerHTML = '&#9790;';
            }
        });

        // Particles
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0, mouseY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 100) {
                    const force = (100 - distance) / 100;
                    this.x -= dx * force * 0.02;
                    this.y -= dy * force * 0.02;
                }
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                const isLight = htmlElement.getAttribute('data-theme') === 'light';
                ctx.fillStyle = isLight ? `rgba(0, 102, 255, ${this.opacity})` : `rgba(0, 212, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = window.innerWidth < 768 ? 25 : 50;
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 120) {
                        const isLight = htmlElement.getAttribute('data-theme') === 'light';
                        ctx.strokeStyle = isLight ? `rgba(0, 102, 255, ${0.1 * (1 - distance / 120)})` : `rgba(0, 212, 255, ${0.1 * (1 - distance / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            connectParticles();
            requestAnimationFrame(animateParticles);
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        resizeCanvas();
        initParticles();
        animateParticles();
        window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

        // Render realistic world map using d3-geo + Natural Earth data
        async function renderWorldMap() {
            const svg = document.getElementById('world-map-svg');
            const width = 1000, height = 500;
            const ns = 'http://www.w3.org/2000/svg';

            const projection = d3.geoNaturalEarth1()
                .scale(170)
                .translate([width / 2, height / 2]);

            const pathGen = d3.geoPath().projection(projection);

            // Continent color palettes (dark theme / light theme)
            const isLight = () => document.documentElement.getAttribute('data-theme') === 'light';
            const continentColors = {
                dark: {
                    'NA': '#1a3d5c', 'SA': '#1a4d4d', 'EU': '#2d3a6b',
                    'AF': '#4d3a2a', 'AS': '#3a2d5c', 'OC': '#1a4d3a',
                    'AN': '#2a3a4d', 'default': '#1e3a5f'
                },
                light: {
                    'NA': '#7db87d', 'SA': '#6dbfa0', 'EU': '#9db87d',
                    'AF': '#d4b87d', 'AS': '#c4a0d4', 'OC': '#7db8a0',
                    'AN': '#b0c4d4', 'default': '#8fbc8f'
                }
            };

            // Map country IDs to continents (using ISO 3166-1 numeric codes)
            const countryContinent = {};
            // North America
            [124,840,484,192,332,388,214,630,44,780,670,659,662,28,312,308,534,535,796,92,320,340,222,558,591,188,76].forEach(id => countryContinent[id] = 'NA');
            // Override Brazil to SA
            [76,32,152,858,600,68,170,218,604,862,328,740,254].forEach(id => countryContinent[id] = 'SA');
            // Europe
            [380,276,250,826,724,620,56,528,40,756,616,203,703,348,642,100,804,112,233,428,440,498,807,70,191,499,688,8,40,352,578,752,246,208].forEach(id => countryContinent[id] = 'EU');
            // Africa
            [12,818,504,788,434,566,288,384,854,466,562,148,180,178,24,508,834,404,800,716,710,426,748,72,516,894,454,450,174,262,232,646,694,768,324,270,624,226,678].forEach(id => countryContinent[id] = 'AF');
            // Asia
            [356,156,392,410,408,496,643,398,860,762,417,764,704,360,458,608,586,4,364,368,400,760,792,682,887,512,634,48,414,376,422,784,275,51,31,268,196].forEach(id => countryContinent[id] = 'AS');
            // Oceania
            [36,554,598,90,540,242,548,776,882,570,584,583,585,520,296].forEach(id => countryContinent[id] = 'OC');

            // Pinned country IDs: Italy=380, South Korea=410, India=356
            const pinnedCountries = new Set([380, 410, 356]);
            const pinnedAlbums = {
                380: { name: 'Italy', path: 'Gallery/Italy/' },
                410: { name: 'Seoul, Korea', path: 'Gallery/Seoul, Korea/' },
                356: { name: 'Jodhpur', path: 'Gallery/Jodhpur/' }
            };

            function getColor(id) {
                const theme = isLight() ? 'light' : 'dark';
                const continent = countryContinent[id] || 'default';
                return continentColors[theme][continent] || continentColors[theme]['default'];
            }

            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
                const world = await response.json();
                const countries = topojson.feature(world, world.objects.countries);

                // Graticule (subtle grid lines)
                const gratEl = document.createElementNS(ns, 'path');
                gratEl.setAttribute('d', pathGen(d3.geoGraticule10()));
                gratEl.setAttribute('class', 'graticule');
                svg.appendChild(gratEl);

                // Countries with continent-based colors
                const countryEls = [];
                countries.features.forEach(f => {
                    const d = pathGen(f);
                    if (!d) return;
                    const el = document.createElementNS(ns, 'path');
                    el.setAttribute('d', d);
                    el.setAttribute('class', 'country' + (pinnedCountries.has(+f.id) ? ' pinned' : ''));
                    el.style.fill = getColor(+f.id);
                    countryEls.push({ el, id: +f.id });
                    svg.appendChild(el);

                    // Click handler for pinned countries
                    if (pinnedCountries.has(+f.id)) {
                        const album = pinnedAlbums[+f.id];
                        el.addEventListener('click', () => openAlbum(album.name, album.path));
                    }
                });

                // Country borders
                const borders = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
                const borderEl = document.createElementNS(ns, 'path');
                borderEl.setAttribute('d', pathGen(borders));
                borderEl.setAttribute('class', 'country-border');
                svg.appendChild(borderEl);

                // Update colors on theme change
                const observer = new MutationObserver(() => {
                    countryEls.forEach(({ el, id }) => { el.style.fill = getColor(id); });
                });
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

                // Position pins using the same projection
                document.querySelectorAll('.map-pin').forEach(pin => {
                    const lat = parseFloat(pin.dataset.lat);
                    const lon = parseFloat(pin.dataset.lon);
                    const [x, y] = projection([lon, lat]);
                    pin.style.left = (x / width * 100) + '%';
                    pin.style.top = (y / height * 100) + '%';
                });

            } catch (err) {
                console.error('Failed to load world map:', err);
            }
        }
        // Wait for deferred d3/topojson scripts before rendering map
        window.addEventListener('load', renderWorldMap);
    </script>
</body>
</html>
